name: Build PS5 CachyOS BORE Kernel
run-name: Build PS5 CachyOS BORE Kernel

on:
  workflow_dispatch:
    inputs:
      patches_ref:
        description: "ps5-linux-patches ref (branch, tag, or SHA)"
        default: "main"
      workspace:
        description: "Case-sensitive build workspace. Defaults to PS5_LINUX_WORKSPACE or RUNNER_TEMP/ps5-linux-kernel."
        default: ""
        type: string
  schedule:
    - cron: "0 2 * * 1"

jobs:
  build:
    runs-on: ubuntu-24.04
    container:
      image: archlinux:latest
      options: --privileged
    timeout-minutes: 720
    permissions:
      contents: write

    steps:
      - name: Install dependencies
        run: |
          echo 'DisableSandbox' >> /etc/pacman.conf
          pacman -Syu --noconfirm
          pacman -S --noconfirm base-devel bc bison flex elfutils openssl python rsync git ccache pahole zstd libarchive

      - name: Checkout image builder
        uses: actions/checkout@v4

      - name: Build CachyOS BORE kernel
        id: build
        run: |
          WORKSPACE="${{ github.event.inputs.workspace }}"
          PATCH_REF="main"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            [ -n "${{ github.event.inputs.patches_ref }}" ] && PATCH_REF="${{ github.event.inputs.patches_ref }}"
          fi
          if [ -z "${WORKSPACE:-}" ] && [ -n "${PS5_LINUX_WORKSPACE:-}" ]; then
            WORKSPACE="$PS5_LINUX_WORKSPACE"
          fi
          if [ -z "${WORKSPACE:-}" ]; then
            WORKSPACE="${RUNNER_TEMP:-$PWD/.runner-temp}/ps5-linux-kernel"
          fi
          mkdir -p "$WORKSPACE"

          # 1. Fetch patches
          PATCHES_DIR="$WORKSPACE/ps5-linux-patches"
          mkdir -p "$PATCHES_DIR"
          git init "$PATCHES_DIR"
          git -C "$PATCHES_DIR" remote add origin https://github.com/bizkut/ps5-linux-patches.git
          git -C "$PATCHES_DIR" fetch --depth 1 origin "$PATCH_REF" || git -C "$PATCHES_DIR" fetch origin "$PATCH_REF"
          git -C "$PATCHES_DIR" reset --hard FETCH_HEAD

          # 2. Run prepare-cachyos-kernel.sh
          LINUX_TMP_DIR="$WORKSPACE/linux.tmp"
          rm -rf "$LINUX_TMP_DIR"
          export WORKSPACE_ROOT="$WORKSPACE"
          export CACHYOS_WORKDIR="$WORKSPACE/upstreams"
          bash scripts/prepare-cachyos-kernel.sh kernel-profiles/ps5-cachyos-bore.env "$LINUX_TMP_DIR" "$PATCHES_DIR"

          # 3. Compile the kernel natively in Arch
          cd "$LINUX_TMP_DIR"
          make -C tools/objtool clean 2>/dev/null || true
          make olddefconfig
          make -j$(nproc) bzImage modules

          # 4. Stage artifacts
          echo "=== Staging build artifacts ==="
          OUT_STAGING="$WORKSPACE/linux-bin/staging"
          rm -rf "$OUT_STAGING"
          mkdir -p "$OUT_STAGING/boot"
          cp arch/x86/boot/bzImage "$OUT_STAGING/boot/"
          cp System.map             "$OUT_STAGING/"
          cp .config                "$OUT_STAGING/"
          make modules_install INSTALL_MOD_PATH="$OUT_STAGING" INSTALL_MOD_STRIP=1
          KVER=$(make -s kernelrelease)
          rm -f "$OUT_STAGING/lib/modules/$KVER/build" "$OUT_STAGING/lib/modules/$KVER/source"

          # Stage headers
          HDR="$OUT_STAGING/headers"
          make headers_install INSTALL_HDR_PATH="$HDR/usr"
          export srctree="$PWD" SRCARCH=x86
          CC=gcc HOSTCC=gcc MAKE=make ./scripts/package/install-extmod-build "$HDR/lib/modules/$KVER/build"

          # 5. Package as pacman .pkg.tar.zst (native version of kernel-builder-arch/build.sh)
          echo "==> Packaging kernel $KVER as pacman package"
          PKGNAME="linux-ps5-cachyos-bore"
          VERSION=${KVER%%-*}
          REL=${KVER#"$VERSION"}
          REL="${REL#-}"
          [ -z "$REL" ] && REL=1

          STAGING=$(mktemp -d)
          mkdir -p "$STAGING/boot"
          cp "$OUT_STAGING/boot/bzImage" "$STAGING/boot/vmlinuz-$KVER"
          cp "$OUT_STAGING/System.map"   "$STAGING/boot/System.map-$KVER"
          cp "$OUT_STAGING/.config"      "$STAGING/boot/config-$KVER"
          mkdir -p "$STAGING/usr/lib/modules"
          cp -a "$OUT_STAGING/lib/modules/$KVER" "$STAGING/usr/lib/modules/"
          if [ -d "$OUT_STAGING/headers" ]; then
              cp -a "$OUT_STAGING/headers/usr" "$STAGING/usr"
              mkdir -p "$STAGING/usr/lib/modules/$KVER"
              cp -a "$OUT_STAGING/headers/lib/modules/$KVER/build" "$STAGING/usr/lib/modules/$KVER/build"
          fi

          cd "$GITHUB_WORKSPACE"
          sed "s/__KVER__/$KVER/g; s/__PKGNAME__/$PKGNAME/g" docker/kernel-builder-arch/install.sh > "$STAGING/.INSTALL"

          # Create .PKGINFO
          BUILDDATE=$(date -u +%s)
          INSTALLED_SIZE=$(du -sb "$STAGING" | awk '{print $1}')
          cat > "$STAGING/.PKGINFO" << EOF
pkgname = $PKGNAME
pkgbase = $PKGNAME
pkgver = $VERSION
pkgrel = $REL
pkgdesc = PS5 Linux CachyOS BORE kernel $KVER (image + modules + headers)
url = https://github.com/bizkut/ps5-linux-image
builddate = $BUILDDATE
packager = ps5-linux
size = $INSTALLED_SIZE
arch = x86_64
license = GPL-2.0-only
provides = linux=$VERSION
provides = linux-headers=$VERSION
provides = linux-api-headers=$VERSION
conflict = linux
conflict = linux-headers
conflict = linux-api-headers
conflict = linux-custom
replaces = linux
replaces = linux-headers
replaces = linux-api-headers
replaces = linux-custom
EOF

          # Create .MTREE
          cd "$STAGING"
          LANG=C bsdtar -czf .MTREE --format=mtree \
              --options='!all,use-set,type,uid,gid,mode,time,size,md5,sha256,link' \
              .PKGINFO .INSTALL *

          mkdir -p "$GITHUB_WORKSPACE/linux-bin"
          echo "$KVER" > "$GITHUB_WORKSPACE/linux-bin/VERSION"
          PKGFILE="${PKGNAME}-${VERSION}-${REL}-1-x86_64.pkg.tar.zst"
          LANG=C bsdtar -cf - .PKGINFO .INSTALL .MTREE * | zstd -c -T0 > "$GITHUB_WORKSPACE/linux-bin/$PKGFILE"

          echo "==> Packaging complete: $GITHUB_WORKSPACE/linux-bin/$PKGFILE"
          echo "patch_ref=$PATCH_REF" >> "$GITHUB_OUTPUT"

      - name: Prepare pacman repo package set
        id: package_repo
        run: |
          set -euo pipefail
          mkdir -p pacman-repo
          cp linux-bin/*.pkg.tar.zst pacman-repo/
          shopt -s nullglob
          pkg_count=$(ls pacman-repo/*.pkg.tar.zst | wc -l | tr -d ' ')
          if [ "$pkg_count" -lt 1 ]; then
            echo "No package produced in linux-bin/" >&2
            exit 1
          fi

          if command -v repo-add >/dev/null 2>&1; then
            (cd pacman-repo && repo-add -n linux-ps5-cachyos-bore.db.tar.gz ./*.pkg.tar.zst)
          else
            docker run --rm -v "$PWD/pacman-repo:/repo" archlinux:latest \
              bash -lc 'cd /repo && repo-add -n linux-ps5-cachyos-bore.db.tar.gz ./*.pkg.tar.zst'
          fi
          cp pacman-repo/linux-ps5-cachyos-bore.db* .
          cp pacman-repo/linux-ps5-cachyos-bore.files* .
          tar -C pacman-repo -czf ps5-cachyos-bore-pacman-repo.tar.gz .
          sha256sum linux-bin/*.pkg.tar.zst > ps5-cachyos-bore.sha256

          kver=$(cat linux-bin/VERSION)
          pkg_name=$(ls linux-bin/*.pkg.tar.zst | head -1 | xargs -n1 basename)
          {
            echo "kver=$kver"
            echo "pkg_name=$pkg_name"
          } >> "$GITHUB_OUTPUT"

      - name: Release kernel and pacman repo
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ps5-cachyos-bore-latest
          name: PS5 Linux CachyOS BORE Kernel (latest)
          make_latest: true
          body: |
            PS5 Linux CachyOS BORE kernel package-only release.

            Kernel: `${{ steps.package_repo.outputs.kver }}`
            Patch set: `${{ steps.build.outputs.patch_ref }}`

            Install pacman package:
            `sudo pacman -U ${{ steps.package_repo.outputs.pkg_name }}`

            Pacman repository:
            - name: `ps5-linux-cachyos-bore`
            - database: `linux-ps5-cachyos-bore.db.tar.gz`
            - base URL: `https://github.com/${{ github.repository }}/releases/download/ps5-cachyos-bore-latest/`

            Checksum:
            `ps5-cachyos-bore.sha256`
          files: |
            linux-bin/*
            linux-ps5-cachyos-bore.db*
            linux-ps5-cachyos-bore.files*
            ps5-cachyos-bore-pacman-repo.tar.gz
            ps5-cachyos-bore.sha256
